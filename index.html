<!DOCTYPE html>
<html lang="fi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyLaskutus</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <h2>EasyLaskutus</h2>
      <button id="showCustomers">Asiakkaat</button>
      <button id="showNewInvoice">Uusi lasku</button>
      <button id="showInvoices">Laskut</button>
      <button id="showSettings">Asetukset</button>
    </aside>

    <main class="content">
      <!-- ASIAKKAAT -->
      <section id="customersSection">
        <h1>Asiakasrekisteri</h1>

        <div class="form-section">
          <h2>Lisää uusi asiakas</h2>

          <form id="customerForm">
            <input type="hidden" id="customerId" />

            <input type="text" id="name" placeholder="Asiakkaan nimi" required />
            <input type="text" id="businessId" placeholder="Y-tunnus" />
            <input type="text" id="address" placeholder="Osoite" />
            <input type="text" id="postalCode" placeholder="Postinumero" />
            <input type="text" id="city" placeholder="Kaupunki" />
            <input type="email" id="email" placeholder="Sähköposti" />
            <input type="text" id="phone" placeholder="Puhelin" />
            <div class="button-row">
              <button type="submit" id="saveCustomerBtn">Tallenna asiakas</button>
              <button type="button" id="cancelEditBtn" class="hidden secondary-btn">Peruuta muokkaus</button>
            </div>
          </form>

          <p id="customerMessage"></p>
        </div>

        <div class="list-section">
          <h2>Asiakkaat</h2>
          <div id="customerList"></div>
        </div>
      </section>

      <!-- UUSI LASKU -->
      <section id="newInvoiceSection" class="hidden">
        <h1>Uusi lasku</h1>

        <div class="form-section">
          <form id="invoiceForm">
            <div class="invoice-top-fields">
              <div class="field-group">
                <label for="invoiceCustomer">Asiakas</label>
                <select id="invoiceCustomer" required>
                  <option value="">Valitse asiakas</option>
                </select>
              </div>

              <div class="invoice-two-columns">
                <div class="field-group">
                  <label for="invoiceNumber">Laskunumero</label>
                  <input type="text" id="invoiceNumber" placeholder="Laskunumero muodostuu automaattisesti" readonly
                    required />
                </div>

                <div class="field-group">
                  <label for="referenceNumber">Viitenumero</label>
                  <input type="text" id="referenceNumber" placeholder="Viitenumero muodostuu automaattisesti"
                    readonly />
                </div>
              </div>

              <div class="invoice-two-columns">
                <div class="field-group">
                  <label for="invoiceDate">Laskun päivämäärä</label>
                  <input type="date" id="invoiceDate" required />
                </div>

                <div class="field-group">
                  <label for="invoiceDueDate">Eräpäivä</label>
                  <input type="date" id="invoiceDueDate" required />
                </div>
              </div>
            </div>

            <h3>Laskurivit</h3>

            <div class="invoice-lines-wrapper">
              <div class="invoice-row-header">
                <span>Kuvaus</span>
                <span>Määrä</span>
                <span>Yksikkö</span>
                <span>Hinta / €</span>
                <span>ALV %</span>
                <span>Rivisumma / €</span>
                <span>Toiminto</span>
              </div>

              <div id="invoiceRows"></div>

              <button type="button" id="addRowBtn">Lisää rivi</button>

              <div class="totals-box">
                <div class="total-row">
                  <span>Veroton summa</span>
                  <span id="invoiceSubtotal">0.00 €</span>
                </div>

                <div class="total-row">
                  <span>ALV</span>
                  <span id="invoiceVatTotal">0.00 €</span>
                </div>

                <div class="total-row total-row-grand">
                  <span>Yhteensä</span>
                  <span id="invoiceTotal">0.00 €</span>
                </div>
              </div>

              <button type="submit" id="saveInvoiceBtn">Tallenna lasku</button>
            </div>
          </form>

          <p id="invoiceMessage"></p>
        </div>
      </section>

      <!-- LASKUT -->
      <section id="invoicesSection" class="hidden">
        <h1>Laskut</h1>

        <div class="list-section">
          <div id="invoiceList"></div>
        </div>
      </section>

      <!-- ASETUKSET -->
      <section id="settingsSection" class="hidden">
        <h1>Asetukset</h1>

        <div class="form-section">
          <h2>Yrityksen tiedot</h2>

          <form id="settingsForm">
            <input type="text" id="companyName" placeholder="Yrityksen nimi" />
            <input type="text" id="settingsBusinessId" placeholder="Y-tunnus" />
            <input type="text" id="settingsAddress" placeholder="Osoite" />
            <input type="text" id="settingsPostalCode" placeholder="Postinumero" />
            <input type="text" id="settingsCity" placeholder="Kaupunki" />
            <input type="email" id="settingsEmail" placeholder="Sähköposti" />
            <input type="text" id="settingsPhone" placeholder="Puhelin" />
            <input type="url" id="settingsWebsite" placeholder="Verkkosivu (http://www.sinunyritys.fi)" />

            <div class="field-group">
              <label for="settingsLogoPath">Logon tiedostopolku</label>
              <input type="text" id="settingsLogoPath" placeholder="Valitse logotiedosto" readonly />
              <button type="button" id="selectLogoBtn">Valitse logo</button>
            </div>

            <input type="text" id="settingsIban" placeholder="IBAN" />
            <input type="text" id="settingsBic" placeholder="BIC" />

            <button type="submit">Tallenna asetukset</button>
          </form>
          <div class="backup-section">
            <h2>Varmuuskopiointi ja vienti</h2>
            <div class="button-row">
              <button type="button" id="export-db-btn">Vie tietokanta</button>
              <button type="button" id="import-db-btn">Tuo tietokanta</button>
              <button type="button" id="export-customers-btn">Vie asiakkaat CSV</button>
              <button type="button" id="export-invoices-btn">Vie laskut CSV</button>
            </div>
          </div>

          <p id="settingsMessage"></p>
        </div>
      </section>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
